name: Notify Parent Repo

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger parent repo update
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.HERMES_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/KNOWIDEA-Tech/hermes/dispatches \
            -d '{"event_type":"submodule-updated","client_payload":{"submodule":"hermes-agent"}}'
